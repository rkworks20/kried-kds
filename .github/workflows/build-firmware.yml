name: Build & Release Firmware

on:
  push:
    branches: [main]
    paths:
      - 'kds_oled/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build firmware and commit binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          set -e

          # ── 1. Install arduino-cli ─────────────────────────────────────────────
          curl -fsSL \
            "https://github.com/arduino/arduino-cli/releases/download/v1.1.1/arduino-cli_1.1.1_Linux_64bit.tar.gz" \
            | tar -xz -C /usr/local/bin arduino-cli
          arduino-cli version

          # ── 2. Board + libraries ───────────────────────────────────────────────
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls \
            "https://espressif.github.io/arduino-esp32/package_esp32_index.json"
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit BusIO"

          # ── 3. Create credentials file from GitHub Secrets ────────────────────
          printf '#define WIFI_SSID     "%s"\n' "$WIFI_SSID"     > kds_oled/credentials.h
          printf '#define WIFI_PASSWORD "%s"\n' "$WIFI_PASSWORD" >> kds_oled/credentials.h

          # ── 4. Compile ─────────────────────────────────────────────────────────
          mkdir -p build
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir build \
            kds_oled

          # ── 4. Commit binary to repo (served via raw.githubusercontent.com) ────
          mkdir -p firmware
          cp build/kds_oled.ino.bin firmware/firmware.bin
          VERSION=$(cat kds_oled/version.txt | tr -d '[:space:]')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/firmware.bin
          git diff --cached --quiet \
            && echo "Binary unchanged" \
            || git commit -m "build: firmware v${VERSION} [skip ci]"
          git push
